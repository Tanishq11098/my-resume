<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tanishq Singhal — Finance Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg:#080a0e;
  --card:#0f1319;
  --text:#e8ecf4;
  --muted:#6a7490;
  --accent:#4dd9c0;
}

/* LIGHT MODE */
body.light {
  --bg:#f5f6f8;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.4s;
}

/* Loader */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#loader span{
  color:white;
  font-size:18px;
  letter-spacing:2px;
}

/* Navbar */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.6);
}
.toggle{cursor:pointer}

/* Hero */
.hero{
  padding:80px 40px;
  text-align:center;
}
.hero h1{font-size:42px}
.hero p{color:var(--muted)}

/* Cards */
.card{
  background:var(--card);
  padding:25px;
  border-radius:10px;
  margin:20px auto;
  max-width:900px;
  transition:0.4s;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* Stats */
.stats{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}
.stat{text-align:center}
.stat h2{color:var(--accent);font-size:30px}

/* Reveal */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.reveal.active{
  opacity:1;
  transform:none;
}

/* Cursor Glow */
.cursor{
  position:fixed;
  width:200px;
  height:200px;
  background:radial-gradient(circle,rgba(77,217,192,0.25),transparent 60%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:999;
}
</style>
</head>

<body>

<div id="loader"><span>Loading...</span></div>
<div class="cursor"></div>

<nav>
  <strong>Tanishq Singhal</strong>
  <div class="toggle" onclick="toggleMode()">🌙</div>
</nav>

<section class="hero reveal">
  <h1>Finance Analyst</h1>
  <p>Built DCF models improving evaluation speed by 30% · NISM-SEBI Certified</p>
</section>

<section class="stats reveal">
  <div class="stat">
    <h2 class="counter" data-target="30">0</h2>
    <p>% Faster Evaluation</p>
  </div>
  <div class="stat">
    <h2 class="counter" data-target="2000">0</h2>
    <p>Network</p>
  </div>
</section>

<section class="card reveal">
  <h3>Finance Experience</h3>
  <p>DCF modelling, financial analysis, forecasting, reports.</p>
</section>

<section class="card reveal">
  <h3>Projects</h3>
  <p>DCF Valuation · Power BI Dashboard · Equity Research</p>
</section>

<script>

/* Loader FIX */
window.addEventListener("load",()=>{
  document.getElementById("loader").style.display="none";
});

/* Dark Mode */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* Cursor Glow */
document.addEventListener("mousemove",(e)=>{
  const c=document.querySelector(".cursor");
  c.style.left=e.clientX+"px";
  c.style.top=e.clientY+"px";
});

/* Reveal */
const reveals=document.querySelectorAll(".reveal");
window.addEventListener("scroll",()=>{
  reveals.forEach(el=>{
    if(el.getBoundingClientRect().top<window.innerHeight-100){
      el.classList.add("active");
    }
  });
});

/* Counter FIX (handles 2K etc) */
document.querySelectorAll(".counter").forEach(counter=>{
  let target=+counter.dataset.target;
  let count=0;

  let update=()=>{
    let inc=target/80;
    if(count<target){
      count+=inc;
      counter.innerText=Math.floor(count);
      requestAnimationFrame(update);
    } else {
      counter.innerText=target;
    }
  };
  update();
});

</script>

</body>
</html>
